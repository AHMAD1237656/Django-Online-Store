
<section class="products-section">
    <h2>Our Products</h2>
    <div class="product-grid">
        {% for product in products %}
        <div class="product-card">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description|truncatewords:15 }}</p>
        </div>
        {% endfor %}
    </div>
</section>
